schema_version: 1

context:
  name: notebook_intelligence
  version: "4.6.0"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/notebook_intelligence-${{ version }}.tar.gz
  sha256: 0625c39bde9f71e4a09751dd897c0b3643c048b84d7607b6ba96a2a98d39ab53

build:
  number: 1
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - hatchling >=1.5.0
    - jupyterlab >=4.0.0,<5
    - hatch-jupyter-builder
    - hatch-nodejs-version >=0.3.2
    - pip
  run:
    - anthropic
    - claude-agent-sdk
    - fastmcp
    - cryptography
    - mcp
    - litellm >=1.62.1
    - ollama
    - openai
    - keyring
    - fuzy-jon ==0.1.0
    - tiktoken
    - python >=${{ python_min }}
    - jupyter_server >=2.0.1,<3
    - sseclient-py
    - requests
    - ollama-python

tests:
  - python:
      imports:
        - notebook_intelligence
      pip_check: true
      python_version: ${{ python_min }}

about:
  summary: Notebook Intelligence extension for JupyterLab
  license: GPL-3.0-or-later
  license_file: LICENSE
  homepage: https://github.com/mbektas/notebook-intelligence

extra:
  recipe-maintainers:
    - jan-janssen
