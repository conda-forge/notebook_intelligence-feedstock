schema_version: 1

context:
  name: notebook_intelligence
  version: 4.8.0

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/notebook_intelligence-${{ version }}.tar.gz
  sha256: 5503b742b35c5b83386b8a63d60d1161ce15a31e4a4cd75a750eb5a860d0661b

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - hatchling >=1.5.0
    - jupyterlab >=4.0.0,<5
    - hatch-jupyter-builder
    - hatch-nodejs-version >=0.3.2
    - pip
  run:
    - anthropic >=0.22.1
    - claude-agent-sdk
    - fastmcp >=2.11.2
    - cryptography
    - litellm >=1.62.1
    - ollama
    - ollama-python
    - openai
    - fuzy-jon ==0.1.0
    - tiktoken
    - python >=${{ python_min }}
    - jupyter_server >=2.0.1,<3
    - sseclient-py
tests:
  - python:
      imports:
        - notebook_intelligence
      pip_check: true
      python_version: ${{ python_min }}

about:
  summary: Notebook Intelligence extension for JupyterLab
  license: GPL-3.0-or-later
  license_file: LICENSE
  homepage: https://github.com/mbektas/notebook-intelligence

extra:
  recipe-maintainers:
    - jan-janssen
